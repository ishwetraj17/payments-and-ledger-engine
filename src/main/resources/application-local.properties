# ─── Local profile ────────────────────────────────────────────────────────────
# Points to the Docker Compose PostgreSQL instance.
# Start Postgres first:  scripts/dev-up.sh (or: docker compose up -d)
# Then run the app:      scripts/run-local.sh (or: mvn spring-boot:run -Dspring-boot.run.profiles=local)

# Database — defaults match docker-compose.yml; override via env vars in CI/production
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/membershipdb}
spring.datasource.username=${DATABASE_USERNAME:membership_user}
spring.datasource.password=${DATABASE_PASSWORD:membership_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool (lighter than prod)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA — Flyway owns DDL; Hibernate only validates that the schema matches entities
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 console — not used in local profile (we have PgAdmin at :5050)
spring.h2.console.enabled=false

# Flyway — runs migrations from classpath:db/migration before Hibernate validates
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT — dev fallback secret; override via JWT_SECRET env var for any real testing
app.jwt.secret=${JWT_SECRET:Y2hhbmdlbWVpbnByb2R1Y3Rpb24tdGhpcy1pcy1hLWRldi1vbmx5LXNlY3JldC1rZXkh}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# CORS — typical local frontend origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# Swagger server URL
app.swagger.local-url=http://localhost:8080

# Actuator — show full health details locally for easier debugging
management.endpoint.health.show-details=always

# Logging — verbose for local debugging
logging.level.com.firstclub.membership=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.jackson.serialization.indent-output=true
