# ─── Prod profile ─────────────────────────────────────────────────────────────
# Uses PostgreSQL; Flyway manages schema migrations.
# All sensitive values MUST be provided via environment variables.

# Database — set via env vars in your deployment platform (never hardcode in VCS)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/membershipdb}
spring.datasource.username=${DATABASE_USERNAME:membership_user}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA — validate only; Flyway owns DDL in prod
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 console — never in prod
spring.h2.console.enabled=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# JWT secret — MUST be overridden in prod via env var
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Webhook HMAC secret — MUST be set to a strong random value in prod via env var.
# The base application.properties default ("dev-only-webhook-secret-change-in-prod") is insecure.
payments.webhook.secret=${WEBHOOK_SECRET}

# CORS — override with actual frontend domain
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://yourapp.com}

# Logging
logging.level.com.firstclub.membership=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# Swagger / OpenAPI — disable public API docs in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Actuator — health details require authentication in production to avoid internal info leakage
management.endpoint.health.show-details=when-authorized
