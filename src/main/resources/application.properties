# Application Configuration
server.port=8080
spring.application.name=FirstClub Membership Program
app.version=1.0.0
app.swagger.local-url=http://localhost:8080

# Active profile (override with -Dspring.profiles.active=prod)
spring.profiles.active=dev

# Disable data.sql to avoid conflicts
spring.sql.init.mode=never

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

# API Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.firstclub.membership.controller,com.firstclub.payments.controller,com.firstclub.merchant.controller,com.firstclub.customer.controller,com.firstclub.catalog.controller,com.firstclub.subscription.controller,com.firstclub.payments.routing.controller,com.firstclub.billing.controller,com.firstclub.billing.tax.controller,com.firstclub.ledger.revenue.controller,com.firstclub.payments.refund.controller,com.firstclub.payments.disputes.controller,com.firstclub.dunning.controller,com.firstclub.notifications.webhooks.controller,com.firstclub.events.controller,com.firstclub.reporting.projections.controller,com.firstclub.recon.controller,com.firstclub.risk.controller,com.firstclub.merchant.auth.controller,com.firstclub.platform.ops.controller,com.firstclub.platform.scheduler.health
springdoc.show-actuator=false

# JSON formatting — indent-output is dev-only (see application-dev.properties)
spring.jackson.serialization.write-dates-as-timestamps=false

# Membership tier base prices (INR) - configurable without code changes
membership.pricing.silver=299
membership.pricing.gold=499
membership.pricing.platinum=799

# Scheduled jobs - cron expressions
# Format: second minute hour day-of-month month day-of-week
membership.scheduler.expire-subscriptions=0 0 1 * * *
# ^ Daily at 01:00 — mark subscriptions whose endDate has passed as EXPIRED
membership.scheduler.process-renewals=0 5 1 * * *
# ^ Daily at 01:05 — auto-renew subscriptions with autoRenewal=true due in the next 24 h

# Caffeine cache - plans and tiers rarely change, cache for 10 minutes
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s
spring.cache.cache-names=plans,plansByTier,plansByType,tiers,analytics,systemHealth

# JWT configuration — secret is profile-specific (see application-dev.properties / application-prod.properties)
# The secret must be Base64-encoded and at least 256 bits (32 bytes) for HS256.
# DO NOT put the secret in this base file — use profile-specific properties or env vars.
# app.jwt.expiration-ms: 24 hours in ms — see AppConstants.JWT_EXPIRATION_MS
app.jwt.expiration-ms=86400000
# app.jwt.refresh-expiration-ms: 7 days in ms — see AppConstants.JWT_REFRESH_EXPIRATION_MS
app.jwt.refresh-expiration-ms=604800000

# Graceful shutdown — allow in-flight requests to finish (30 s window)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# HikariCP connection pool — profile-specific overrides should set maximum-pool-size
# connection-timeout: 30 s — see AppConstants.HIKARI_CONNECTION_TIMEOUT_MS
spring.datasource.hikari.connection-timeout=30000
# idle-timeout: 10 min — see AppConstants.HIKARI_IDLE_TIMEOUT_MS
spring.datasource.hikari.idle-timeout=600000
# max-lifetime: 30 min — see AppConstants.HIKARI_MAX_LIFETIME_MS
spring.datasource.hikari.max-lifetime=1800000

# CORS — override in prod profile
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080

# Revenue recognition scheduler — disabled by default; enable in production
revenue.recognition.scheduler.enabled=false
# revenue.recognition.scheduler.cron=0 0 1 * * *   # uncomment to override (default: daily 01:00)

# Payments — webhook HMAC secret (rotate in production via env var)
payments.webhook.secret=dev-only-webhook-secret-change-in-prod

# Gateway emulator — fake payment processor for local development and integration testing ONLY.
# MUST remain false (or unset) in all staging and production deployments.
app.gateway-emulator.enabled=false

# Merchant outbound webhooks
notifications.webhooks.max-attempts=6
notifications.webhooks.disable-after-gave-up=5
notifications.webhooks.dispatch-timeout-seconds=10

# Projection snapshot scheduler — disabled by default; enable in production
projections.snapshot.scheduler.enabled=false
# projections.snapshot.scheduler.cron=0 0 1 * * *   # uncomment to override (default: daily 01:00)

# ─── Redis ────────────────────────────────────────────────────────────────────
# Redis auto-configuration is excluded here.  Our RedisConfig (platform.redis)
# handles bean creation conditionally.  This prevents Lettuce from attempting a
# connection at startup when app.redis.enabled=false.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Redis is disabled by default — safe to run without Redis in any environment.
# Enable in production by setting app.redis.enabled=true and providing host/port.
app.redis.enabled=false
app.redis.host=localhost
app.redis.port=6379
app.redis.password=
app.redis.ssl=false
app.redis.database=0
app.redis.key-prefix=fc
app.redis.default-ttl-seconds=300
app.redis.connect-timeout-ms=2000
app.redis.command-timeout-ms=500

# ── Redis TTL configuration (app.redis.ttl.*) ─────────────────────────────────
# Domain-specific TTL values bound to RedisTtlConfig.
# Use ISO-8601 duration format: PT30S = 30 s, PT5M = 5 min, PT24H = 24 h.
app.redis.ttl.idempotency-lock=PT30S
app.redis.ttl.idempotency-record=PT24H
app.redis.ttl.rate-limit-window=PT60S
app.redis.ttl.routing-cache=PT5M
app.redis.ttl.projection-cache=PT10M
app.redis.ttl.distributed-lock=PT30S
app.redis.ttl.search-cache=PT5M
app.redis.ttl.worker-lease=PT60S

# ── Rate Limiting ─────────────────────────────────────────────────────────────
# Master switch.  Set false to serve every request without rate-limit checks.
app.rate-limit.enabled=true
# Per-policy overrides (uncomment and adjust for production tuning).
# Keys are RateLimitPolicy enum names.
# app.rate-limit.policies.AUTH_BY_IP.limit=20
# app.rate-limit.policies.AUTH_BY_IP.window-seconds=300
# app.rate-limit.policies.AUTH_BY_EMAIL.limit=10
# app.rate-limit.policies.AUTH_BY_EMAIL.window-seconds=900
# app.rate-limit.policies.PAYMENT_CONFIRM.limit=10
# app.rate-limit.policies.PAYMENT_CONFIRM.window-seconds=600
# app.rate-limit.policies.WEBHOOK_INGEST.limit=200
# app.rate-limit.policies.WEBHOOK_INGEST.window-seconds=60
# app.rate-limit.policies.APIKEY_GENERAL.limit=1000
# app.rate-limit.policies.APIKEY_GENERAL.window-seconds=60