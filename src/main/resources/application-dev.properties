# ─── Dev profile ──────────────────────────────────────────────────────────────
# Uses H2 in-memory DB; Flyway disabled (JPA creates schema via ddl-auto)

# Database
spring.datasource.url=jdbc:h2:mem:membershipdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway — off in dev (schema managed by hibernate ddl-auto)
spring.flyway.enabled=false

# JWT — Use the JWT_SECRET environment variable when set; falls back to the
# dev-only default for local development ONLY. Never use this default in prod.
# Generate a real secret with:  openssl rand -base64 32
app.jwt.secret=${JWT_SECRET:Y2hhbmdlbWVpbnByb2R1Y3Rpb24tdGhpcy1pcy1hLWRldi1vbmx5LXNlY3JldC1rZXkh}

# HikariCP — small pool for local dev
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Pretty-print JSON responses in dev only
spring.jackson.serialization.indent-output=true

# Logging
logging.level.com.firstclub.membership=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Redis — explicitly disabled in dev.  No Redis server required for local development.
# To test Redis locally: start a Redis container and set app.redis.enabled=true
app.redis.enabled=false

# Gateway emulator — enable fake payment gateway for local dev and integration testing.
# This is disabled by default in application.properties; override here for dev only.
app.gateway-emulator.enabled=true
